<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Estrutura</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
            color: #222;
        }

        h1 {
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            gap: 12px;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            min-width: 320px;
        }

        button {
            padding: 10px 18px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #0d6efd;
            color: white;
            font-size: 15px;
        }

        button:hover {
            background: #0b5ed7;
        }

        .stats {
            font-weight: bold;
            margin-top: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .panel {
            background: white;
            padding: 18px;
            border-radius: 8px;
            border: 1px solid #ddd;
            overflow: auto;
            max-height: 70vh;
        }

        pre {
            font-family: Consolas, monospace;
            white-space: pre;
            margin: 0;
        }

        ul {
            list-style: none;
            padding-left: 22px;
        }

        li {
            margin: 4px 0;
            font-family: Consolas, monospace;
        }

        .folder {
            cursor: pointer;
            font-weight: bold;
            color: #8250df;
        }

        .file {
            color: #444;
        }

        .hidden {
            display: none;
        }

        .highlight {
            background: yellow;
            padding: 2px 4px;
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <h1>Visualizador de Estrutura de Projeto</h1>

    <div class="controls">
        <div class="row">
            <button onclick="abrirDiretorio()">Selecionar Diretório</button>
            <button onclick="copiarEstrutura()">Copiar Estrutura</button>
            <button onclick="expandirTudo()">Expandir Tudo</button>
            <button onclick="colapsarTudo()">Colapsar Tudo</button>
        </div>

        <div class="row">
            <label>
                Ignorar pastas/arquivos:
                <input
                    id="ignorados"
                    type="text"
                    value=".git, .next, node_modules, dist, build, .turbo, .idea, .vscode, coverage, .env, .DS_Store, Thumbs.db"
                >
            </label>
        </div>

        <div class="row">
            <label>
                Buscar:
                <input
                    id="busca"
                    type="text"
                    placeholder="Ex: page, package, components..."
                    oninput="aplicarBusca()"
                >
            </label>

            <label>
                <input
                    id="mostrarExtensoes"
                    type="checkbox"
                    checked
                    onchange="renderizarTudo()"
                >
                Mostrar extensões
            </label>
        </div>

        <div id="stats" class="stats">
            Nenhum diretório selecionado.
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Visualização</h2>
            <div id="arvoreVisual">Selecione um diretório...</div>
        </div>

        <div class="panel">
            <h2>Texto copiável</h2>
            <pre id="saida">Selecione um diretório...</pre>
        </div>
    </div>

    <script>
        let arvore = null;
        let estruturaTexto = "";
        let totalPastas = 0;
        let totalArquivos = 0;

        function obterIgnorados() {
            return new Set(
                document
                    .getElementById("ignorados")
                    .value
                    .split(",")
                    .map(item => item.trim())
                    .filter(Boolean)
            );
        }

        function deveIgnorar(nome) {
            return obterIgnorados().has(nome);
        }

        function formatarNome(nome, tipo) {
            const mostrarExtensoes = document.getElementById("mostrarExtensoes").checked;

            if (tipo === "directory" || mostrarExtensoes) {
                return nome;
            }

            const ultimoPonto = nome.lastIndexOf(".");

            if (ultimoPonto <= 0) {
                return nome;
            }

            return nome.substring(0, ultimoPonto);
        }

        async function abrirDiretorio() {
            if (!window.showDirectoryPicker) {
                alert("Seu navegador não suporta esta API. Use Chrome ou Edge.");
                return;
            }

            const root = await window.showDirectoryPicker();

            totalPastas = 0;
            totalArquivos = 0;

            arvore = await lerDiretorio(root);

            renderizarTudo();
        }

        async function lerDiretorio(diretorioHandle) {
            const node = {
                name: diretorioHandle.name,
                type: "directory",
                children: [],
                fileCount: 0
            };

            totalPastas++;

            for await (const item of diretorioHandle.values()) {
                if (deveIgnorar(item.name)) {
                    continue;
                }

                if (item.kind === "directory") {
                    const pastaFilha = await lerDiretorio(item);

                    node.children.push(pastaFilha);
                    node.fileCount += pastaFilha.fileCount;
                } else {
                    node.children.push({
                        name: item.name,
                        type: "file",
                        children: [],
                        fileCount: 1
                    });

                    node.fileCount++;
                    totalArquivos++;
                }
            }

            node.children.sort((a, b) => {
                if (a.type !== b.type) {
                    return a.type === "directory" ? -1 : 1;
                }

                return a.name.localeCompare(b.name);
            });

            return node;
        }

        function renderizarTudo() {
            if (!arvore) {
                return;
            }

            estruturaTexto = gerarTexto(arvore);
            document.getElementById("saida").textContent = estruturaTexto;

            document.getElementById("arvoreVisual").innerHTML = "";
            document.getElementById("arvoreVisual").appendChild(gerarVisual(arvore));

            document.getElementById("stats").textContent =
                `Pastas: ${totalPastas} | Arquivos: ${totalArquivos}`;

            aplicarBusca();
        }

        function gerarTexto(node, prefixo = "", isRoot = true) {
            let texto = "";

            if (isRoot) {
                texto += `${formatarNome(node.name, node.type)} (${node.fileCount} arquivos)\n`;
            }

            node.children.forEach((child, index) => {
                const ultimo = index === node.children.length - 1;
                const ponteiro = ultimo ? "└── " : "├── ";
                const novoPrefixo = prefixo + (ultimo ? "    " : "│   ");

                if (child.type === "directory") {
                    texto += `${prefixo}${ponteiro}${formatarNome(child.name, child.type)} (${child.fileCount} arquivos)\n`;
                    texto += gerarTexto(child, novoPrefixo, false);
                } else {
                    texto += `${prefixo}${ponteiro}${formatarNome(child.name, child.type)}\n`;
                }
            });

            return texto;
        }

        function gerarVisual(node) {
            const ul = document.createElement("ul");

            const li = document.createElement("li");

            const span = document.createElement("span");
            span.className = "folder";
            span.textContent = `📁 ${formatarNome(node.name, node.type)} (${node.fileCount} arquivos)`;

            const childrenUl = document.createElement("ul");

            node.children.forEach(child => {
                if (child.type === "directory") {
                    childrenUl.appendChild(gerarVisual(child).firstChild);
                } else {
                    const fileLi = document.createElement("li");
                    const fileSpan = document.createElement("span");

                    fileSpan.className = "file";
                    fileSpan.textContent = `📄 ${formatarNome(child.name, child.type)}`;
                    fileSpan.dataset.name = child.name.toLowerCase();

                    fileLi.appendChild(fileSpan);
                    childrenUl.appendChild(fileLi);
                }
            });

            span.onclick = () => {
                childrenUl.classList.toggle("hidden");
            };

            span.dataset.name = node.name.toLowerCase();

            li.appendChild(span);
            li.appendChild(childrenUl);
            ul.appendChild(li);

            return ul;
        }

        function aplicarBusca() {
            const termo = document.getElementById("busca").value.toLowerCase().trim();

            const spans = document.querySelectorAll("#arvoreVisual span");

            spans.forEach(span => {
                span.classList.remove("highlight");

                if (termo && span.dataset.name.includes(termo)) {
                    span.classList.add("highlight");

                    let parent = span.parentElement;

                    while (parent) {
                        if (parent.tagName === "UL") {
                            parent.classList.remove("hidden");
                        }

                        parent = parent.parentElement;
                    }
                }
            });

            focarPrimeiroResultado();
        }

        function expandirTudo() {
            document
                .querySelectorAll("#arvoreVisual ul")
                .forEach(ul => ul.classList.remove("hidden"));
        }

        function colapsarTudo() {
            document
                .querySelectorAll("#arvoreVisual ul ul")
                .forEach(ul => ul.classList.add("hidden"));
        }

        async function copiarEstrutura() {
            if (!estruturaTexto) {
                return;
            }

            await navigator.clipboard.writeText(estruturaTexto);
            alert("Estrutura copiada!");
        }

        function focarPrimeiroResultado() {
            const primeiroResultado = document.querySelector("#arvoreVisual .highlight");

            if (!primeiroResultado) {
                return;
            }

            primeiroResultado.scrollIntoView({
                behavior: "smooth",
                block: "center",
                inline: "nearest"
            });
        }
    </script>

</body>
</html>
